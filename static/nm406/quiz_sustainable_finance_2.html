// ─── Shuffle helper ───────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function prepareQuestions() {
  // Shuffle option order for every question, keeping correct flag attached
  shuffledQuestions = questions.map(q => ({
    ...q,
    options: shuffle(q.options.map((opt, i) => ({ ...opt, origIdx: i })))
  }));
}

      : '<div class="hint">Nur eine Antwort richtig</div>';

    let optionsHTML = q.options.map((opt, oi) => `
      <label class="option-label" id="opt-${qi}-${oi}">
        <input type="${type}" name="q${qi}" value="${oi}" onchange="onchange_handler(${qi})">
        <span class="option-text">${opt.text}</span>
      </label>
    `).join('');

    card.innerHTML = `
      <div class="question-number">Frage ${qi + 1} von ${shuffledQuestions.length}</div>
      <div class="question-text">${q.text}</div>
      ${hint}
      ${optionsHTML}
      <button class="check-btn" id="btn-${qi}" onclick="checkQuestion(${qi})">Antwort prüfen</button>
      <div class="feedback" id="fb-${qi}"></div>
    `;

    container.appendChild(card);
  });

  updateProgress();
}

function onchange_handler(qi) {
  // re-enable check button if user changes answer
  document.getElementById(`btn-${qi}`).disabled = false;
}

// ─── Check single question ────────────────────────────────────────────────────
function checkQuestion(qi) {
  const q = shuffledQuestions[qi];
  const inputs = document.querySelectorAll(`input[name="q${qi}"]`);
  const selected = [];
  inputs.forEach((inp, oi) => { if (inp.checked) selected.push(oi); });

  if (selected.length === 0) return;

  answered[qi] = true;
  document.getElementById(`btn-${qi}`).disabled = true;
  inputs.forEach(inp => inp.disabled = true);

  const correctIndices = q.options.map((o, i) => o.correct ? i : -1).filter(i => i >= 0);
  const selectedSet = new Set(selected);

  let allCorrect = true;
  let anyCorrect = false;

  q.options.forEach((opt, oi) => {
    const lbl = document.getElementById(`opt-${qi}-${oi}`);
    lbl.classList.remove('correct-choice', 'wrong-choice', 'missed-choice');
    const span = lbl.querySelector('.option-text');
    span.innerHTML = opt.text;

    if (opt.correct && selectedSet.has(oi)) {
      lbl.classList.add('correct-choice');
      span.innerHTML = '✔ ' + opt.text;
      anyCorrect = true;
    } else if (!opt.correct && selectedSet.has(oi)) {
      lbl.classList.add('wrong-choice');
      span.innerHTML = '✘ ' + opt.text;
      allCorrect = false;
    } else if (opt.correct && !selectedSet.has(oi)) {
      lbl.classList.add('missed-choice');
      span.innerHTML = '● ' + opt.text;
      allCorrect = false;
    }
  });

  const card = document.getElementById(`card-${qi}`);
  const fb   = document.getElementById(`fb-${qi}`);
  fb.style.display = 'block';

  if (allCorrect && selected.length === correctIndices.length) {
    card.classList.add('correct');
    fb.className = 'feedback correct';
    fb.textContent = '✔ Richtig! Alle Antworten korrekt.';
  } else if (anyCorrect) {
    card.classList.add('partial');
    fb.className = 'feedback partial';
    fb.textContent = '◑ Teilweise richtig. Die markierten Antworten zeigen die Lösung.';
  } else {
    card.classList.add('wrong');
    fb.className = 'feedback wrong';
    fb.textContent = '✘ Leider falsch. Die richtigen Antworten sind markiert.';
  }

  updateProgress();
}

// ─── Check all ────────────────────────────────────────────────────────────────
function checkAll() {
  questions.forEach((_, qi) => {
    if (!answered[qi]) {
      const inputs = document.querySelectorAll(`input[name="q${qi}"]`);
      const anySelected = Array.from(inputs).some(i => i.checked);
      if (anySelected) checkQuestion(qi);
    }
  });
  showScore();
}

// ─── Score ────────────────────────────────────────────────────────────────────
function showScore() {
  let correct = 0, partial = 0, wrong = 0;

  shuffledQuestions.forEach((q, qi) => {
    if (!answered[qi]) return;
    const inputs = document.querySelectorAll(`input[name="q${qi}"]`);
    const selected = [];
    inputs.forEach((inp, oi) => { if (inp.checked) selected.push(oi); });

    const correctIndices = new Set(q.options.map((o,i) => o.correct ? i : -1).filter(i => i >= 0));
    const selectedSet = new Set(selected);

    const allRight = selected.length === correctIndices.size &&
      selected.every(i => correctIndices.has(i));
    const anyRight = selected.some(i => correctIndices.has(i));

    if (allRight) correct++;
    else if (anyRight) partial++;
    else wrong++;
  });

  const total = correct + partial + wrong;
  if (total === 0) return;

  const score = Math.round(correct + partial * 0.5);

  document.getElementById('scoreCircle').innerHTML = `${score}<span>/ ${total}</span>`;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statPartial').textContent = partial;
  document.getElementById('statWrong').textContent = wrong;

  const pct = total > 0 ? score / total : 0;
  let title, msg;
  if (pct >= 0.9)      { title = 'Ausgezeichnet! 🎉'; msg = 'Sie beherrschen den Stoff sehr gut.'; }
  else if (pct >= 0.7) { title = 'Gut gemacht! 👍';   msg = 'Einige Themen können noch vertieft werden.'; }
  else if (pct >= 0.5) { title = 'Befriedigend';       msg = 'Wiederholen Sie die schwächeren Bereiche.'; }
  else                 { title = 'Noch Übungsbedarf';  msg = 'Lesen Sie die Vorlesungsfolien nochmals durch.'; }

  document.getElementById('scoreTitle').textContent = title;
  document.getElementById('scoreMsg').textContent   = msg;
  document.getElementById('scorePanel').style.display = 'block';
  document.getElementById('scorePanel').scrollIntoView({ behavior: 'smooth' });
}

// ─── Progress ─────────────────────────────────────────────────────────────────
function updateProgress() {
  const done = answered.filter(Boolean).length;
  const total = questions.length;
  const pct  = Math.round(done / total * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} von ${total} beantwortet`;
}

// ─── Reset ────────────────────────────────────────────────────────────────────
function resetAll() {
  answered = new Array(questions.length).fill(false);
  document.getElementById('scorePanel').style.display = 'none';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── Init ─────────────────────────────────────────────────────────────────────
render();
</script>
