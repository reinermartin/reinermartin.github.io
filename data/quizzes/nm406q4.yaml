        correct: true
      - text: "Kontroverse Anlagemöglichkeiten wie fossile Energiebereitstellung werden ausgeschlossen"
        correct: true
      - text: "Anschließend erfolgt eine Selektion anhand von Positivkriterien"
        correct: true
      - text: "Er ist eine Mischform aus positivem und negativem Screening"
        correct: true

