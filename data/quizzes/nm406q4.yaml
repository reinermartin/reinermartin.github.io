      - text: "Es werden die nachhaltigsten Investitionsmöglichkeiten innerhalb eines Bereichs ausgewählt"
        correct: true
      - text: "Nachhaltige Aktivitäten von Unternehmen werden gegenüber weniger nachhaltigen der gleichen Branche bevorteilt"
