    multi: false
    options:
      - text: "Er hat kein nachhaltiges Anlageziel und bewertet nur Umweltrisiken."
        correct: false
      - text: "Er hat ein konkretes nachhaltiges Anlageziel, das über wirtschaftliche Gewinne hinausgeht."
        correct: false
      - text: "Er ist verpflichtet, eine Nachhaltigkeitsstrategie zu veröffentlichen und zu berücksichtigen (hellgrüner Fonds / ESG-Fonds)."
        correct: true
