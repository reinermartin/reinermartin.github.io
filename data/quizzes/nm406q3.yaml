title: "Quiz 3 – Sustainable Finance NM406"
subtitle: "Dr. Reiner Martin · THM Gießen · Sommersemester 2026"
# description: "25 Fraaaaaagen · Einfach- und Mehrfachauswahl"

questions:
  - text: "Was muss eine ökologisch nachhaltige Wirtschaftstätigkeit laut EU-Taxonomie leisten?"
    multi: false
    options:
      - text: "Sie muss zu allen sechs Umweltzielen wesentlich beitragen."
        correct: false
      - text: "Sie muss zu mindestens einem der sechs Umweltziele wesentlich beitragen."
        correct: true
      - text: "Sie muss ausschließlich erneuerbare Energien nutzen."
        correct: false
      - text: "Sie muss von einer Zertifizierungsstelle anerkannt sein."
        correct: false

  - text: "Was beschreibt das Prinzip 'Do no significant harm' in der EU-Taxonomie?"
    multi: false
    options:
      - text: "Die Aktivität darf keine Gewinne erwirtschaften."
        correct: false
      - text: "Die Aktivität darf kein anderes Umweltziel signifikant beeinträchtigen."
        correct: true
      - text: "Die Aktivität muss soziale Mindeststandards erfüllen."
        correct: false
      - text: "Die Aktivität darf nicht börsennotiert sein."
        correct: false

  - text: "Was versteht man unter einer 'Ermöglichenden Wirtschaftstätigkeit' laut EU-Taxonomie?"
    multi: false
    options:
      - text: "Eine Tätigkeit, die direkt CO₂ reduziert."
        correct: false
      - text: "Eine Tätigkeit, die unmittelbar anderen Tätigkeiten ermöglicht, einen wesentlichen Beitrag zu mindestens einem Umweltziel zu leisten."
        correct: true
      - text: "Eine Tätigkeit im Bereich der erneuerbaren Energien."
        correct: false
      - text: "Eine Tätigkeit, die ausschließlich von der öffentlichen Hand durchgeführt wird."
        correct: false

  - text: "Welche Bedingungen muss eine Wirtschaftstätigkeit laut EU-Taxonomie erfüllen, um als nachhaltig zu gelten?"
    multi: true
    options:
      - text: "Wesentlichen Beitrag zu mindestens einem Umweltziel leisten."
        correct: true
      - text: "ESG-Mindestanforderungen erfüllen."
        correct: true
      - text: "Kein anderes Umweltziel signifikant beeinträchtigen (DNSH)."
        correct: true
      - text: "In allen sechs Umweltzielen führend sein."
        correct: false
      - text: "Von einer EU-Behörde zertifiziert werden."
        correct: false

  - text: "Was ist ein Lock-In-Effekt im Kontext nachhaltiger Finanzen?"
    multi: false
    options:
      - text: "Eine staatliche Förderung für nachhaltige Investitionen."
        correct: false
      - text: "Die Bindung von Unternehmen an nicht-nachhaltige Technologien durch langfristige Investitionsentscheidungen."
        correct: true
      - text: "Ein Mechanismus zur Sicherung von Gewinnen bei Investmentfonds."
        correct: false
      - text: "Eine Regulierung, die Unternehmen zur Nachhaltigkeitsberichterstattung verpflichtet."
        correct: false

  - text: "Welche der folgenden Beispiele sind klassische Lock-In-Effekte?"
    multi: true
    options:
      - text: "Bau eines Gaskraftwerks statt Solar- und Windlösungen."
        correct: true
      - text: "Ausbau eines großen Diesel-Fuhrparks statt Investitionen in Elektromobilität."
        correct: true
      - text: "Investition in fossil betriebene Heiz- und Kühlsysteme statt Wärmepumpen."
        correct: true
      - text: "Installation von Solaranlagen auf dem Firmendach."
        correct: false
      - text: "Umstieg auf klimaneutrale Produktionsprozesse."
        correct: false

  - text: "Wofür steht die Abkürzung CSRD?"
    multi: false
    options:
      - text: "Corporate Sustainability Reporting Directive"
        correct: true
      - text: "Climate and Social Responsibility Directive"
        correct: false
      - text: "Corporate Standards and Regulatory Disclosure"
        correct: false
      - text: "Climate Sustainability Reporting Directive"
        correct: false

  - text: "Was war der Vorgänger der CSRD?"
    multi: false
    options:
      - text: "SFDR"
        correct: false
      - text: "MiFID I"
        correct: false
      - text: "NFRD (Non-Financial Reporting Directive)"
        correct: true
      - text: "ESRS"
        correct: false

  - text: "Was ist das Ziel der CSRD?"
    multi: false
    options:
      - text: "Die Abschaffung der NFRD."
        correct: false
      - text: "Die Erhöhung der Rechenschaftspflicht europäischer Unternehmen über Nachhaltigkeitsaspekte und Einführung verbindlicher Berichtsstandards auf EU-Ebene."
        correct: true
      - text: "Die ausschließliche Regulierung von Finanzinstituten."
        correct: false
      - text: "Die Einführung eines einheitlichen CO₂-Preises in der EU."
        correct: false

  - text: "Wie viele Unternehmen sind nach vollständiger Einführung der CSRD (prä-Omnibus) EU-weit berichtspflichtig?"
    multi: false
    options:
      - text: "ca. 11.600"
        correct: false
      - text: "ca. 25.000"
        correct: false
      - text: "ca. 49.000"
        correct: true
      - text: "ca. 100.000"
        correct: false

  - text: "Was versteht die CSRD unter 'doppelter Wesentlichkeit'?"
    multi: false
    options:
      - text: "Unternehmen müssen sowohl Finanz- als auch Nachhaltigkeitsberichte erstellen."
        correct: false
      - text: "Unternehmen müssen sowohl über Auswirkungen des Geschäftsbetriebs auf Mensch und Umwelt als auch über Auswirkungen von Nachhaltigkeitsaspekten auf das Unternehmen berichten."
        correct: true
      - text: "Berichte müssen von zwei unabhängigen Prüfern gegengezeichnet werden."
        correct: false
      - text: "Sowohl große als auch kleine Unternehmen müssen berichten."
        correct: false

  - text: "Welche zentralen Neuerungen bringt die CSRD mit sich?"
    multi: true
    options:
      - text: "Einführung der doppelten Wesentlichkeit."
        correct: true
      - text: "Externe Prüfung der Nachhaltigkeitsberichterstattung."
        correct: true
      - text: "Nachhaltigkeitsinformationen als verpflichtender Teil des Lageberichts."
        correct: true
      - text: "Einheitliches elektronisches Berichtsformat (ESEF)."
        correct: true
      - text: "Abschaffung der Finanzberichterstattung."
        correct: false
      - text: "Einführung einer Nachhaltigkeitssteuer."
        correct: false

  - text: "Welche Art der externen Prüfung ist nach der CSRD zunächst vorgesehen?"
    multi: false
    options:
      - text: "Reasonable Assurance (hinreichende Sicherheit)"
        correct: false
      - text: "Absolute Assurance (vollständige Sicherheit)"
        correct: false
      - text: "Limited Assurance (begrenzte Sicherheit)"
        correct: true
      - text: "Keine externe Prüfung"
        correct: false

  - text: "In welchem Berichtsdokument sollen Nachhaltigkeitsinformationen laut CSRD verpflichtend veröffentlicht werden?"
    multi: false
    options:
      - text: "Im Anhang des Jahresabschlusses"
        correct: false
      - text: "Im Lagebericht"
        correct: true
      - text: "In einem separaten Nachhaltigkeitsbericht"
        correct: false
      - text: "Im Verkaufsprospekt"
        correct: false

  - text: "Was ist das ESEF und welche Rolle spielt es im Rahmen der CSRD?"
    multi: false
    options:
      - text: "Ein Prüfstandard für Nachhaltigkeitsberichte, der von der BaFin eingeführt wurde."
        correct: false
      - text: "Das European Single Electronic Format – ein maschinenlesbares Berichtsformat, das im Rahmen der CSRD auf die Nachhaltigkeitsberichterstattung ausgeweitet werden soll."
        correct: true
      - text: "Ein Förderprogramm der EU für nachhaltige Unternehmen."
        correct: false
      - text: "Ein Zertifizierungsrahmen für ESG-Ratingagenturen."
        correct: false

  - text: "Welche der folgenden Punkte sind Chancen der CSRD?"
    multi: true
    options:
      - text: "Förderung von Transparenz und Vertrauen."
        correct: true
      - text: "Erleichterter Zugang zu Kapital."
        correct: true
      - text: "Verbesserung der Nachhaltigkeitsleistungen."
        correct: true
      - text: "Stärkung der Wettbewerbsfähigkeit."
        correct: true
      - text: "Reduktion der Unternehmenssteuer."
        correct: false
      - text: "Abschaffung der Finanzberichterstattung."
        correct: false

  - text: "Welche der folgenden Punkte sind Risiken der CSRD?"
    multi: true
    options:
      - text: "Umsetzungskosten und -komplexität, insbesondere für KMU."
        correct: true
      - text: "Risiko des Informationsüberflusses."
        correct: true
      - text: "Spannung zwischen Transparenz und Wettbewerbsfähigkeit."
        correct: true
      - text: "Fehlende Standardisierung und Vergleichbarkeit trotz Vereinheitlichungsanspruch."
        correct: true
      - text: "Zu hohe Gewinne durch Nachhaltigkeitsberichterstattung."
        correct: false

  - text: "Was hat das Omnibus-Paket (Richtlinie 2026/470) mit der CSRD gemacht?"
    multi: false
    options:
      - text: "Die CSRD verschärft und auf mehr Unternehmen ausgeweitet."
        correct: false
      - text: "Die CSRD grundlegend entschärft, um Bürokratie abzubauen und die Wettbewerbsfähigkeit zu stärken."
        correct: true
      - text: "Die CSRD vollständig abgeschafft."
        correct: false
      - text: "Die CSRD auf Finanzinstitute beschränkt."
        correct: false

  - text: "Ab welcher Unternehmensgröße gilt die CSRD-Berichtspflicht nach dem Omnibus-Paket?"
    multi: false
    options:
      - text: "> 250 Mitarbeitende und > 40 Mio. € Umsatz"
        correct: false
      - text: "> 500 Mitarbeitende und > 20 Mio. € Bilanzsumme"
        correct: false
      - text: "> 1.000 Mitarbeitende und > 450 Mio. € Umsatz"
        correct: true
      - text: "> 5.000 Mitarbeitende und > 1 Mrd. € Umsatz"
        correct: false

  - text: "Welche Änderungen brachte das Omnibus-Paket gegenüber der ursprünglichen CSRD?"
    multi: true
    options:
      - text: "Neuer, enger Anwendungsbereich: nur noch Unternehmen mit > 1.000 MA und > 450 Mio. € Umsatz."
        correct: true
      - text: "ESRS werden stark vereinfacht, sektorspezifische Standards entfallen."
        correct: true
      - text: "Kein Übergang zu Reasonable Assurance – dauerhaft Limited Assurance."
        correct: true
      - text: "Börsennotierte KMU fallen ganz heraus."
        correct: true
      - text: "Einführung einer CO₂-Steuer für berichtspflichtige Unternehmen."
        correct: false
      - text: "Verpflichtende Echtzeit-Datenberichterstattung."
        correct: false

  - text: "Was ist der VSME-Standard?"
    multi: false
    options:
      - text: "Ein verpflichtender Nachhaltigkeitsstandard für große Unternehmen."
        correct: false
      - text: "Ein freiwilliger Nachhaltigkeitsberichtsstandard für KMU, entwickelt von der EFRAG."
        correct: true
      - text: "Ein EU-Gesetz zur Regulierung von Investmentfonds."
        correct: false
      - text: "Ein staatlicher Standard für öffentliche Unternehmen."
        correct: false

  - text: "Was ist die EFRAG und welche Aufgaben hat sie?"
    multi: true
    options:
      - text: "Sie ist eine private, gemeinnützige Organisation mit Sitz in Brüssel."
        correct: true
      - text: "Sie berät die EU-Kommission in Fragen der Finanz- und Nachhaltigkeitsberichterstattung."
        correct: true
      - text: "Sie ist offiziell zuständig für die Entwicklung und Pflege der ESRS."
        correct: true
      - text: "Sie ist eine EU-Behörde mit Hoheitsrechten über Unternehmen."
        correct: false
      - text: "Sie legt verbindliche Steuersätze für nachhaltige Investments fest."
        correct: false

  - text: "Wofür steht die Abkürzung SFDR?"
    multi: false
    options:
      - text: "Sustainable Finance Disclosure Regulation"
        correct: true
      - text: "Social Finance and Development Regulation"
        correct: false
      - text: "Sustainable Fund Diversity Requirement"
        correct: false
      - text: "Standard Finance Data Reporting"
        correct: false

  - text: "Wen betrifft die SFDR primär?"
    multi: true
    options:
      - text: "Finanzinstitute"
        correct: true
      - text: "Vermögensverwalter"
        correct: true
      - text: "Investmentfonds"
        correct: true
      - text: "Alle Unternehmen mit mehr als 250 Mitarbeitenden"
        correct: false
      - text: "Nur börsennotierte Unternehmen im DAX"
        correct: false

  - text: "Welche Ziele verfolgt die SFDR?"
    multi: true
    options:
      - text: "Vergleichbarkeit nachhaltiger Anlagestrategien für Anleger erleichtern."
        correct: true
      - text: "Mehr Transparenz darüber schaffen, inwieweit Finanzprodukte ökologische und/oder soziale Kriterien berücksichtigen."
        correct: true
      - text: "Präsentation in standardisiertem Format."
        correct: true
      - text: "Einheitliche CO₂-Bepreisung für Finanzprodukte einführen."
        correct: false
      - text: "Die Abschaffung konventioneller Anlageprodukte."
        correct: false

  - text: "Was verlangt die SFDR von Vermögensverwaltern und Anlageberatern auf Unternehmensebene?"
    multi: true
    options:
      - text: "Offenlegung zu Nachhaltigkeitsrisiken."
        correct: true
      - text: "Offenlegung zu wesentlichen nachteiligen Auswirkungen (PAI)."
        correct: true
      - text: "Transparenz darüber, inwieweit die Vergütungspolitik mit der Berücksichtigung von Nachhaltigkeitsrisiken im Einklang steht."
        correct: true
      - text: "Mindestens 30 % des Portfolios in grüne Anleihen zu investieren."
        correct: false
      - text: "Jährliche CO₂-Kompensationszahlungen zu leisten."
        correct: false

  - text: "Wofür steht PAI in der SFDR?"
    multi: false
    options:
      - text: "Paris Alignment Index"
        correct: false
      - text: "Principal Adverse Impact"
        correct: true
      - text: "Portfolio Allocation Instrument"
        correct: false
      - text: "Proxy Advisory Indicator"
        correct: false

  - text: "Wie viele verpflichtende PAI-Indikatoren gibt es insgesamt, und wie verteilen sie sich?"
    multi: true
    options:
      - text: "14 Indikatoren für Emittenten auf Unternehmensebene."
        correct: true
      - text: "2 Indikatoren speziell für staatliche und supranationale Emittenten."
        correct: true
      - text: "2 Indikatoren für Emittenten aus dem Immobiliensektor."
        correct: true
      - text: "10 Indikatoren ausschließlich für Hedgefonds."
        correct: false

  - text: "Welche Klima-/Umwelt-Indikatoren gehören zu den verpflichtenden PAI-Elementen für Investitionen in Unternehmen?"
    multi: true
    options:
