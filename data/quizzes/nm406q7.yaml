  #       correct: false
  #     - text: US$ 240 Mrd.
  #       correct: false
  #     - text: US$ 320 Mrd.
  #       correct: true
  #     - text: US$ 420 Mrd.
  #       correct: false

  - text: Welche indirekten Auswirkungen haben transitorische Klimarisiken auf Versicherungen?
    multi: true
    options:
      - text:
          Technologiewandel (z. B. Elektromobilität) führt zu neuen Schadenarten wie
          Batteriebränden.
        correct: true
      - text: Zunahme von Klimaklagen erhöht Haftpflichtschäden.
        correct: true
      - text: CO₂-Preise senken Produktionskosten und damit Schadenvolumen.
        correct: false
      - text: Abwertung emissionsintensiver Assets belastet Kapitalanlagen der Versicherer.
        correct: true

  - text: Was ist 'Rückversicherung' im Kontext von Klimarisiken?
    multi: false
    options:
      - text: Eine staatliche Absicherung für Versicherungsunternehmen.
        correct: false
      - text:
          Die Versicherung der Versicherung -- Versicherungsunternehmen versichern
          selbst einen Teil ihrer Risiken weiter.
        correct: true
      - text: Eine Rückzahlungsgarantie für Versicherungsprämien.
        correct: false
      - text: Ein Fonds zur Rücklagenbildung für Extremereignisse.
        correct: false

  - text:
      Warum stellen Klimarisiken eine besondere Herausforderung für die Versicherungskalkulation
      dar?
    multi: false
    options:
      - text: Weil Klimarisiken vollständig durch bestehende Modelle abgedeckt sind.
        correct: false
      - text: Weil zunehmende Extremereignisse die Risikostreuung und Kalkulation erschweren.
        correct: true
      - text: Weil Klimarisiken nur kurzfristiger Natur sind.
        correct: false
      - text: Weil Klimarisiken ausschließlich physischer Natur sind.
        correct: false
