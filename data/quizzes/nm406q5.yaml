title: "Quiz 5 – Sustainable Finance NM406"
subtitle: "Dr. Reiner Martin · THM Gießen · Sommersemester 2026"

questions:
  - text: "Wo findet man die wichtigsten Informationen über einen Investmentfonds?"
    multi: false
    options:
      - text: "Im Jahresabschluss des Fondsmanagers"
        correct: false
      - text: "Im Fondsfaktenblatt (Fact Sheet)"
        correct: true
      - text: "Im Handelsregister"
        correct: false
      - text: "In der Satzung der Fondsgesellschaft"
        correct: false

  - text: "Welche der folgenden Informationen findet man typischerweise im Fondsfaktenblatt?"
    multi: true
    options:
      - text: "Ziel und Strategie des Fonds"
        correct: true
      - text: "Gebühren (Verwaltung, Erfolg, Zeichnung und Rücknahme)"
        correct: true
      - text: "Steuernummer des Fondsmanagers"
        correct: false
      - text: "Historische Renditen über verschiedene Zeiträume"
        correct: true

  - text: "Was misst das Alpha eines Fonds?"
    multi: false
    options:
      - text: "Die Volatilität des Fonds im Vergleich zum Geldmarkt"
        correct: false
      - text: "Die Wertentwicklung eines Fonds im Vergleich zu seiner Benchmark"
        correct: true
      - text: "Den maximalen Verlust innerhalb einer Periode"
        correct: false
      - text: "Die Abweichung der Rendite vom Vergleichsindex"
        correct: false

  - text: "Was bedeutet ein Beta von 1 bei einem Fonds?"
    multi: false
    options:
      - text: "Der Fonds erzielt eine Überrendite gegenüber dem Markt"
        correct: false
      - text: "Der Fonds schwankt ähnlich wie der Markt"
        correct: true
      - text: "Der Fonds ist risikolos"
        correct: false
      - text: "Der Fonds bildet den Index exakt nach"
        correct: false

  - text: "Was setzt die Sharpe-Ratio ins Verhältnis?"
    multi: false
    options:
      - text: "Überrendite zum Tracking Error"
        correct: false
      - text: "Alpha zum Beta"
        correct: false
      - text: "Überrendite zum eingegangenen Risiko (Standardabweichung)"
        correct: true
      - text: "Maximum Drawdown zur durchschnittlichen Rendite"
        correct: false

  - text: "Was misst der Tracking Error?"
    multi: false
    options:
      - text: "Den maximalen Verlust eines Fonds"
        correct: false
      - text: "Wie stark die Renditen eines Fonds von der Rendite des Vergleichsindex abweichen"
        correct: true
      - text: "Die Überrendite gegenüber dem risikofreien Zinssatz"
        correct: false
      - text: "Die Sensitivität gegenüber Marktschwankungen"
        correct: false

  - text: "Ein niedriger Tracking Error bedeutet..."
    multi: false
    options:
      - text: "...dass der Fonds eine hohe Überrendite erzielt"
        correct: false
      - text: "...dass der Fonds den Index exakter nachbildet"
        correct: true
      - text: "...dass das Fondsrisiko besonders hoch ist"
        correct: false
      - text: "...dass der Fonds aktiv gemanagt wird"
        correct: false

  - text: "Was setzt die Information Ratio ins Verhältnis?"
    multi: false
    options:
      - text: "Alpha zu Beta"
        correct: false
      - text: "Überrendite zum Tracking Error"
        correct: true
      - text: "Rendite zur Standardabweichung"
        correct: false
      - text: "Fondsvolumen zur Benchmark-Rendite"
        correct: false

  - text: "Was zeigt der Maximum Drawdown?"
    multi: false
    options:
      - text: "Den aktuellen Verlust seit dem letzten Hoch"
        correct: false
      - text: "Wie stark der Wert eines Fonds innerhalb eines Zeitraums gefallen ist – vom höchsten bis zum tiefsten Punkt"
        correct: true
      - text: "Die durchschnittliche jährliche Rendite des Fonds"
        correct: false
      - text: "Den Vergleich mit dem Marktindex"
        correct: false

  - text: "Was ist der Unterschied zwischen Maximum Drawdown und Current Drawdown?"
    multi: false
    options:
      - text: "Es gibt keinen Unterschied, beide Begriffe sind synonym"
        correct: false
      - text: "Maximum Drawdown ist der maximale Verlust der Periode; Current Drawdown ist der aktuelle Verlust seit dem letzten Hoch"
        correct: true
      - text: "Current Drawdown bezieht sich immer auf das gesamte Jahr"
        correct: false
      - text: "Maximum Drawdown wird täglich, Current Drawdown monatlich berechnet"
        correct: false

  - text: "Welche Kennzahlen sind bei der Analyse von Aktienfonds laut Fondsfaktenblatt relevant?"
    multi: true
    options:
      - text: "Geografische Verteilung"
        correct: true
      - text: "Sektorale Verteilung"
        correct: true
      - text: "Unternehmensgröße"
        correct: true
      - text: "Mitarbeiterzahl des Fondsmanagers"
        correct: false

  - text: "Was ist BlackRock hinsichtlich seiner Marktstellung?"
    multi: false
    options:
      - text: "Größter Hedgefonds der Welt"
        correct: false
      - text: "Größter Vermögensverwalter weltweit"
        correct: true
      - text: "Größte Investmentbank Europas"
        correct: false
      - text: "Größter staatlicher Sovereign Wealth Fund"
        correct: false

  - text: "Wie hoch ist das verwaltete Vermögen (AUM) von BlackRock ungefähr?"
    multi: false
    options:
      - text: "USD 1 Bio."
        correct: false
      - text: "USD 5 Bio."
        correct: false
      - text: "USD 14 Bio."
        correct: true
      - text: "USD 100 Bio."
        correct: false


  - text: "Welchen Anteil des Gesamt-AUM machen BlackRocks nachhaltige Fondsvolumina aus?"
    multi: false
    options:
      - text: "Etwa 1–2 %"
        correct: false
      - text: "Etwa 7–8 %"
        correct: true
      - text: "Etwa 25 %"
        correct: false
      - text: "Etwa 50 %"
        correct: false


  - text: "Was ist eine Anleihe?"
    multi: false
    options:
      - text: "Ein Eigentumsanteil an einem Unternehmen"
        correct: false
      - text: "Eine Art Darlehen, das ein Staat, eine Gebietskörperschaft oder ein Unternehmen aufnimmt"
        correct: true
      - text: "Ein Derivat zur Absicherung von Währungsrisiken"
        correct: false
      - text: "Ein Investmentfonds mit festem Zinssatz"
        correct: false

  - text: "Was ist der Kupon einer Anleihe?"
    multi: false
    options:
      - text: "Der Ausgabepreis der Anleihe"
        correct: false
      - text: "Der Ausgleich (Zinszahlung) den der Anleger erhält"
        correct: true
      - text: "Das Bonitätsrating des Emittenten"
        correct: false
      - text: "Die Laufzeit der Anleihe"
        correct: false

  - text: "Was passiert bei Fälligkeit einer Anleihe (sofern kein Insolvenzfall vorliegt)?"
    multi: false
    options:
      - text: "Der Anleger erhält eine Dividende"
        correct: false
      - text: "Der Emittent zahlt das ursprünglich ausgeliehene Kapital zurück"
        correct: true
      - text: "Die Anleihe wird automatisch verlängert"
        correct: false
      - text: "Der Kupon wird verdoppelt"
        correct: false

  - text: "Wie werden Anleihen auch genannt?"
    multi: false
    options:
      - text: "Eigenkapitaltitel"
        correct: false
      - text: "Festverzinsliche Anlagen (Fixed Income)"
        correct: true
      - text: "Derivate"
        correct: false
      - text: "Rohstoffzertifikate"
        correct: false

  - text: "Welche der folgenden sind wichtige Merkmale einer Anleihe?"
    multi: true
    options:
      - text: "Nennwert"
        correct: true
      - text: "Laufzeit (oder Fälligkeit)"
        correct: true
      - text: "Bonitätsrating"
        correct: true
      - text: "Dividendenrendite"
        correct: false

  - text: "Was ist der Nennwert einer Anleihe?"
    multi: false
    options:
      - text: "Der aktuelle Marktpreis der Anleihe"
        correct: false
      - text: "Der Wert der Anleihe bei ihrer Emission"
        correct: true
      - text: "Der jährliche Zinssatz"
        correct: false
      - text: "Die Restlaufzeit der Anleihe"
        correct: false

  - text: "Was ist die Emissionswährung einer Anleihe?"
    multi: false
    options:
      - text: "Die Währung, in der der Kupon berechnet wird"
        correct: false
      - text: "Die Währung, in der die Anleihe ausgegeben wurde"
        correct: true
      - text: "Die Heimatwährung des Anlegers"
        correct: false
      - text: "Die Währung des Landes, in dem der Emittent seinen Sitz hat"
        correct: false

  - text: "Was gibt das Bonitätsrating einer Anleihe an?"
    multi: false
    options:
      - text: "Die erwartete Rendite der Anleihe"
        correct: false
      - text: "Die Qualität der Zahlungsfähigkeit des Emittenten"
        correct: true
      - text: "Die Laufzeit der Anleihe"
        correct: false
      - text: "Den aktuellen Marktzins"
        correct: false

  - text: "Was unterscheidet eine Anleihe von einer Aktie hinsichtlich des rechtlichen Status?"
    multi: false
    options:
      - text: "Eine Aktie ist ein Darlehen, eine Anleihe ist ein Eigentumsanteil"
        correct: false
      - text: "Eine Aktie ist ein Eigentumsanteil, eine Anleihe ist eine Schuldverschreibung"
        correct: true
      - text: "Beide sind Eigentumsanteile, aber mit unterschiedlichen Rechten"
        correct: false
      - text: "Beide sind Schuldtitel mit unterschiedlicher Laufzeit"
        correct: false

  - text: "Welche Rechte hat ein Aktionär, die ein Anleihe-Gläubiger nicht hat?"
    multi: true
    options:
      - text: "Abstimmung auf Hauptversammlungen"
        correct: true
      - text: "Wahl in den Verwaltungsrat"
        correct: true
      - text: "Regelmäßiger fester Ertrag"
        correct: false
      - text: "Kontrolle der Unternehmensführung"
        correct: true

  - text: "Welchen Vorteil hat ein Anleihe-Gläubiger gegenüber einem Aktionär im Insolvenzfall?"
    multi: false
    options:
      - text: "Der Gläubiger erhält höhere Zinsen"
        correct: false
      - text: "Der Gläubiger hat Vorrang vor dem Aktionär"
        correct: true
      - text: "Der Gläubiger kann das Unternehmen übernehmen"
        correct: false
      - text: "Der Gläubiger bekommt eine Dividende garantiert"
        correct: false

  - text: "Was bedeutet das S&P-Rating AAA?"
    multi: false
    options:
      - text: "Hochspekulative Anlage"
        correct: false
      - text: "Höchste Bonität, kein Ausfallrisiko erkennbar"
        correct: true
      - text: "Durchschnittliche Bonität"
        correct: false
      - text: "Risikohafte Anlage mit partiellem Zahlungsausfall"
        correct: false

  - text: "Welche Ratingklasse entspricht bei Moody's der S&P-Klasse BBB?"
    multi: false
    options:
      - text: "Ba2"
        correct: false
      - text: "Aa2"
        correct: false
      - text: "Baa2"
        correct: true
      - text: "B2"
        correct: false

  - text: "Ab welchem Rating gilt eine Anleihe laut Folie als spekulative Anlage?"
    multi: false
    options:
      - text: "Ab BBB–"
        correct: false
      - text: "Ab BB+"
        correct: true
      - text: "Ab A–"
        correct: false
      - text: "Ab CCC"
        correct: false

  - text: "Was kennzeichnet Anleihen der Kategorie B (hochspekulative Anlage)?"
    multi: false
    options:
      - text: "Keine erkennbares Ausfallrisiko"
        correct: false
      - text: "Ausfälle sind bei Verschlechterung der Lage sehr wahrscheinlich"
        correct: true
      - text: "Vollständiger Zahlungsausfall ist bereits eingetreten"
        correct: false
      - text: "Angemessene Deckung von Zins und Tilgung"
        correct: false

  - text: "Was ist ein Green Bond?"
    multi: false
    options:
      - text: "Eine Anleihe von Umweltministerien"
        correct: false
      - text: "Eine Anleihe, die ausschließlich in nachhaltig orientierte Projekte investiert"
        correct: true
      - text: "Ein Fonds, der in grüne Technologieaktien investiert"
        correct: false
      - text: "Eine staatliche Förderanleihe für Landwirtschaft"
        correct: false

  - text: "Seit wann gibt es Green Bonds?"
    multi: false
    options:
      - text: "Seit 1990"
        correct: false
      - text: "Seit 2000"
        correct: false
      - text: "Seit 2007"
        correct: true
      - text: "Seit 2015"
        correct: false

  - text: "Wie viel wurde laut Folie im Jahr 2021 weltweit an Green Bonds neu emittiert?"
    multi: false
    options:
      - text: "Knapp 100 Mrd €"
        correct: false
      - text: "Knapp 300 Mrd €"
        correct: false
      - text: "Knapp 600 Mrd €"
