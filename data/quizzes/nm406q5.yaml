  - text: "Welche Projekte können durch Green Bonds finanziert werden?"
    multi: true
    options:
      - text: "Erneuerbare Energien"
        correct: true
      - text: "Nachhaltige Mobilität"
        correct: true
      - text: "Abfall- und Kreislaufwirtschaft"
        correct: true
      - text: "Rüstungsindustrie"
