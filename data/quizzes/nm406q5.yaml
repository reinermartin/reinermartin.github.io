  - text: "Was sind die vier ESG-Bond-Typen?"
    multi: true
    options:
      - text: "Green Bonds"
        correct: true
      - text: "Social Bonds"
        correct: true
      - text: "Sustainability Bonds"
        correct: true
      - text: "Sustainability-linked Bonds"
        correct: true

  - text: "Was ist ein Social Bond?"
    multi: false
    options:
      - text: "Eine Anleihe zur Finanzierung von ökologischen Projekten"
        correct: false
      - text: "Eine Anleihe, die in Projekte mit gesellschaftlichen Zielen investiert"
        correct: true
      - text: "Eine Anleihe mit variablem Kupon"
        correct: false
      - text: "Eine Anleihe, die an Nachhaltigkeitsziele geknüpft ist"
        correct: false

  - text: "Was ist das Besondere an Sustainability-linked Bonds?"
    multi: false
    options:
      - text: "Sie finanzieren ausschließlich Solarprojekte"
        correct: false
      - text: "Ihr Kupon ist an das Erreichen klar definierter Nachhaltigkeitsziele geknüpft"
        correct: true
      - text: "Sie werden nur von der EU emittiert"
        correct: false
      - text: "Sie haben immer eine Laufzeit von 30 Jahren"
        correct: false

  - text: "Was passiert beim Sustainability-linked Bond, wenn Nachhaltigkeitsziele verfehlt werden?"
    multi: false
    options:
      - text: "Der Kupon sinkt"
        correct: false
      - text: "Der Kupon steigt"
        correct: true
      - text: "Die Anleihe wird sofort fällig"
        correct: false
      - text: "Der Emittent muss eine Strafe an den Staat zahlen"
        correct: false

  - text: "Was ist der Unterschied zwischen Green Bonds und Sustainability Bonds?"
    multi: false
    options:
      - text: "Es gibt keinen Unterschied"
        correct: false
      - text: "Green Bonds finanzieren ökologische Projekte; Sustainability Bonds finanzieren ökologische und soziale Projekte"
        correct: true
      - text: "Sustainability Bonds haben einen höheren Kupon"
        correct: false
      - text: "Green Bonds werden nur von Staaten emittiert"
        correct: false

  - text: "Welche Organisation hat die Green Bond Principles entwickelt?"
    multi: false
