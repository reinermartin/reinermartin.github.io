    multi: true
    options:
      - text: "Richtlinien zu Transparenz und Offenlegung geben"
        correct: true
      - text: "Geschönte oder falsche Darstellung von grünen Aspekten verhindern"
        correct: true
      - text: "Einen gesetzlichen Mindest-Kupon festlegen"
        correct: false
      - text: "Berichterstattungsstandards für Emittenten setzen"
