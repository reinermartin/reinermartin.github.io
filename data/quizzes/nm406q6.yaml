questions:
  - text: "Wann legte die Europäische Kommission den Vorschlag zur Reform der SFDR (SFDR 2.0) vor?"
    multi: false
    options:
      - text: "Januar 2025"
        correct: false
      - text: "November 2025"
        correct: true
      - text: "März 2026"
        correct: false
      - text: "November 2024"
        correct: false

  - text: "Welche Kritikpunkte an der bestehenden SFDR führten zur geplanten Reform?"
    multi: true
    options:
      - text: "Artikel 8/9 werden faktisch als ESG-Labels interpretiert, obwohl sie nur ein Transparenzregime sind."
        correct: true
      - text: "Hohe Komplexität und geringe Vergleichbarkeit führen zu Greenwashing-Risiken."
        correct: true
      - text: "Probleme bei der Datenqualität, insbesondere für PAI-Indikatoren."
        correct: true
      - text: "Die SFDR enthält keine Offenlegungspflichten für Retail-Investoren."
        correct: false

  - text: "Welche neuen Produktkategorien sind unter SFDR 2.0 geplant und welche PAI-Pflicht gilt jeweils?"
    multi: true
    options:
      - text: "Art. 8 neu (ESG-Basis): PAI-Berichtspflicht ist nicht verpflichtend."
        correct: true
      - text: "Art. 9 neu (Nachhaltigkeitskategorie): PAI-Berichtspflicht ist verpflichtend."
        correct: true
      - text: "Art. 7 neu (Übergangskategorie): PAI-Berichtspflicht ist verpflichtend."
        correct: true
      - text: "Art. 9a neu (Gemischt): PAI-Pflicht ist einheitlich für alle Dachfonds verpflichtend."
        correct: false

